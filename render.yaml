services:
  - type: web
    name: truemoney-telegram-bot
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: TRUEMONEY_TOKEN
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: MONITORING_INTERVAL
        value: "10"
